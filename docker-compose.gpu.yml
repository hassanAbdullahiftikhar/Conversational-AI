services:
  llm-engine:
    # Requires NVIDIA Container Toolkit and a supported GPU on the host.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  api-gateway:
    environment:
      # HF Compliance
      LLM_TEMPERATURE: 1.0
      LLM_TOP_P: 0.95
      LLM_TOP_K: 64
