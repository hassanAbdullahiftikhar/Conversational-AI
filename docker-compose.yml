services:
  llm-engine:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    ports:
      - "11434:11434"
    volumes:
      - hf_cache:/root/.cache/huggingface
      - nexa_slots:/.nexa_slots
    command: --hf-repo unsloth/gemma-4-E4B-it-GGUF --hf-file gemma-4-E4B-it-Q4_K_M.gguf --no-mmproj --host 0.0.0.0 --port 11434 -c 32768 -np 4 --kv-unified --n-gpu-layers 99 --flash-attn on --cache-type-k q4_0 --cache-type-v q4_0 --jinja -b 2048 -ub 1024 --no-mmap --mlock -t 6 --slot-save-path /.nexa_slots --cache-reuse 256
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:11434/health" ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 900s

  conv-manager:
    build: ./conv-manager
    restart: unless-stopped
    volumes:
      - ./conv-manager:/app
      - ./conv-manager/smart_home_rag/data:/app/smart_home_rag/data
      - conv-manager-crm:/tmp
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')" ]
      interval: 30s
      timeout: 10s
      retries: 5
    environment:
      LLM_URL: http://llm-engine:11434
      PROMPT_SLOT_SYSTEM_TOKENS: "1400"

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./api-gateway:/app
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 5
    environment:
      CONV_MANAGER_URL: http://conv-manager:8001
      LLM_URL: http://llm-engine:11434
      EMBED_URL: http://llm-engine:11434
      EVAL_MODE: "true"
      LLM_MODEL: gemma-4-E4B-it
      # Voice extension
      ASR_SERVICE_WS_URL: ws://asr-service:8002/ws/transcribe
      TTS_SERVICE_URL: http://tts-service:8003
    depends_on:
      - llm-engine
      - conv-manager
      - asr-service
      - tts-service

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

  # ── Voice Extension Services ─────────────────────────────────
  asr-service:
    build: ./asr-service
    ports:
      - "8002:8002"
    environment:
      MOONSHINE_LANGUAGE: en
    volumes:
      - moonshine_cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8002/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  tts-service:
    build: ./tts-service
    ports:
      - "8003:8003"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8003/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  hf_cache:
  nexa_slots:
  moonshine_cache:
  conv-manager-crm:

    # Fix for Docker Desktop on Windows: default MTU 1500 causes large packet
    # fragmentation/drops when downloading apt package indexes from Debian mirrors.
    # Setting MTU to 1450 resolves "Connection timed out" errors during docker build.
networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1450"
