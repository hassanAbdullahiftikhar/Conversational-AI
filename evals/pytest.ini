[pytest]
asyncio_mode = auto
testpaths = evals
markers =
    suite1: Conversational correctness tests
    suite2: RAG component tests
    suite3: CRM tool tests
    suite4: Additional tool tests (weather, calculator, web_search)
    suite5: Latency and throughput tests
    slow: Tests taking more than 30 seconds
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s %(levelname)s %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
filterwarnings =
    ignore::DeprecationWarning:ragas
    ignore::DeprecationWarning:datasets
